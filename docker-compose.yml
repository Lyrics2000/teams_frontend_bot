
networks:
  app-network:
    external: true
services:
  bot-admin-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: britam_bot_admin_frontend
    ports:
      - "5173:5173"
    networks:
      - app-network
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://web:8365/api
      - VITE_USE_MOCKS=false
    restart: unless-stopped
