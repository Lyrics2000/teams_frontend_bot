networks:
  app-network:
    external: true
services:
  bot-admin-frontend:
    build: .
    container_name: britam_bot_admin_frontend
    ports:
      - "5173:5173"
    networks:
      - app-network
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
      - VITE_BOT_SECRET=dev-bot-secret
      - VITE_USE_MOCKS=true
